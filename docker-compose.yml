version: '3.8'

services:
  backend:
    build: ./backend
    container_name: hercademy-backend
    restart: unless-stopped
    volumes:
      - sqlite-data:/data
    environment:
      - PORT=3001
      - DB_PATH=/data/dashboard.db
      # Bootstrap-Konto (nur beim allerersten Start relevant, danach ignoriert).
      # Werte über eine .env-Datei setzen (siehe .env.example) — NICHT hier eintragen,
      # diese Datei ist versioniert. Leer lassen -> zufälliges Passwort landet im Log.
      - BOOTSTRAP_ADMIN_EMAIL=${BOOTSTRAP_ADMIN_EMAIL:-}
      - BOOTSTRAP_ADMIN_PASSWORD=${BOOTSTRAP_ADMIN_PASSWORD:-}
      # Cookie-/Proxy-Sicherheit: erst auf true stellen, wenn der "caddy"-Service
      # (siehe unten, profiles: ["tls"]) aktiv ist und echtes TLS terminiert.
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - TRUST_PROXY=${TRUST_PROXY:-false}
      # SMTP-Mailversand (Passwort-Reset, Zugangsdaten) — standardmäßig deaktiviert.
      # Erst nach Abstimmung mit der IT auf MAIL_ENABLED=true stellen und SMTP_* füllen.
      - MAIL_ENABLED=${MAIL_ENABLED:-false}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - MAIL_FROM=${MAIL_FROM:-}
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:3000}
      # Web Push (Workflows) — ohne gesetzte Keys werden Push-Aktionen übersprungen/geloggt.
      # Erzeugen mit: npx web-push generate-vapid-keys
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - VAPID_SUBJECT=${VAPID_SUBJECT:-mailto:admin@example.com}
    networks:
      - hercademy-net

  frontend:
    build: ./frontend
    container_name: hercademy-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - hercademy-net

  # Optionaler TLS-Reverse-Proxy — startet NUR mit "docker compose --profile tls up".
  # Siehe Caddyfile für Aktivierungsschritte.
  caddy:
    image: caddy:2-alpine
    container_name: hercademy-caddy
    restart: unless-stopped
    profiles: ["tls"]
    ports:
      - "443:443"
      - "80:80"
    environment:
      - SITE_DOMAIN=${SITE_DOMAIN:-localhost}
      # internal = selbstsigniert fürs LAN (Standard); für den echten Launch später auf
      # eine Kontakt-E-Mail (z.B. admin@ihre-domain.example) für Let's Encrypt umstellen.
      - TLS_MODE=${TLS_MODE:-internal}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - frontend
    networks:
      - hercademy-net

networks:
  hercademy-net:
    driver: bridge

volumes:
  sqlite-data:
  caddy-data:
  caddy-config:
