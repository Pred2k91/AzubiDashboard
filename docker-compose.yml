version: '3.8'

services:
  backend:
    build: ./backend
    container_name: dashboard-backend
    restart: unless-stopped
    volumes:
      - sqlite-data:/data
    environment:
      - PORT=3001
      - DB_PATH=/data/dashboard.db
    networks:
      - dashboard-net

  frontend:
    build: ./frontend
    container_name: dashboard-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - dashboard-net

networks:
  dashboard-net:
    driver: bridge

volumes:
  sqlite-data:
